name: Kids Video Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 18 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: image_cache/
          key: image-cache-${{ runner.os }}
          restore-keys: image-cache-

      - name: Restore Kokoro TTS model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/
          key: kokoro-tts-model-v1
          restore-keys: kokoro-tts-model-

      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          pip install edge-tts
          npm ci

      - name: Run pipeline
        env:
          # Story AI waterfall: Groq → Gemini → DeepSeek
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Image waterfall: Stability AI → Pollinations (free, no key)
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          # YouTube upload
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node pipeline/pipeline.js

      - name: Save image cache
        uses: actions/cache@v4
        with:
          path: image_cache/
          key: image-cache-${{ runner.os }}
