name: Generate & Upload Kids Video

on:
  schedule:
    - cron: '0 8 * * *'    # 8:00 AM UTC daily
    - cron: '0 12 * * *'   # 12:00 PM UTC daily
    - cron: '0 18 * * *'   # 6:00 PM UTC daily
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout your repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Python (for Whisper) ────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. System dependencies (FFmpeg + ImageMagick) ─────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick
          ffmpeg -version | head -1
          echo "✅ FFmpeg ready"

      # ── 5. Python dependencies (edge-tts + whisper) ───────────────────────
      - name: Install Python packages
        run: |
          pip install --quiet edge-tts openai-whisper
          echo "✅ edge-tts + Whisper ready"

      # ── 6. Node dependencies ──────────────────────────────────────────────
      - name: Install Node packages
        run: npm ci

      # ── 7. Run the pipeline ───────────────────────────────────────────────
      - name: Generate video & upload to YouTube
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VIDEO_TOPIC_SEED:       ${{ secrets.VIDEO_TOPIC_SEED }}   # optional
        run: node pipeline/pipeline.js

      # ── 8. Upload artifacts on failure (for debugging) ───────────────────
      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            output/
            *.log
          retention-days: 3
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
